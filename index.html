<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtForge AI - Kesin Çözüm</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--border:#2e2e2e;--text:#f0f0f0;--white:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding:20px;display:flex;justify-content:center;}
  .wrap{width:100%;max-width:500px;}
  .card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;}
  h1{font-family:'Space Mono',monospace;font-size:22px;margin-bottom:20px;text-align:center;}
  textarea{width:100%;background:#000;border:1px solid var(--border);border-radius:8px;padding:12px;color:#fff;margin-bottom:10px;resize:none;outline:none;}
  select{width:100%;padding:10px;background:#000;color:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
  .gbtn{width:100%;padding:15px;border-radius:8px;border:none;background:var(--white);color:#000;font-weight:700;cursor:pointer;text-transform:uppercase;}
  .gbtn:disabled{opacity:0.3;cursor:not-allowed;}
  .result{min-height:300px;background:var(--s2);border:2px dashed var(--border);border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
  #resImg{width:100%;display:none;}
  .loading{display:none;text-align:center;}
  .spin{width:30px;height:30px;border:3px solid #333;border-top-color:#fff;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 10px;}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="wrap">
  <h1>ArtForge AI</h1>
  
  <div class="card">
    <select id="model">
      <option value="turbo">Turbo (En Hızlı & Sorunsuz)</option>
      <option value="flux">Flux (Kaliteli ama Yavaş/Hata verebilir)</option>
    </select>
    <textarea id="prompt" rows="3" placeholder="Örn: golden dragon, cinematic lighting..."></textarea>
    <button class="gbtn" id="gbtn" onclick="generate()">GÖRSEL OLUŞTUR</button>
  </div>

  <div class="result" id="resBox">
    <div id="phText">🖼 Görsel buraya gelecek</div>
    <div class="loading" id="loader">
      <div class="spin"></div>
      <p>AI çiziyor, lütfen bekle...</p>
    </div>
    <img id="resImg" alt="AI Generated">
  </div>
</div>

<script>
async function generate() {
  const promptInput = document.getElementById('prompt');
  const btn = document.getElementById('gbtn');
  const img = document.getElementById('resImg');
  const loader = document.getElementById('loader');
  const ph = document.getElementById('phText');
  const model = document.getElementById('model').value;

  if(!promptInput.value.trim()) return alert("Lütfen bir şeyler yaz!");

  // UI Güncelle
  btn.disabled = true;
  btn.innerText = "OLUŞTURULUYOR...";
  ph.style.display = "none";
  img.style.display = "none";
  loader.style.display = "block";

  const seed = Math.floor(Math.random() * 999999);
  const cleanPrompt = encodeURIComponent(promptInput.value.trim());
  const url = `https://image.pollinations.ai/prompt/${cleanPrompt}?width=512&height=512&model=${model}&seed=${seed}&nologo=true`;

  try {
    // Görseli arka planda kontrol et
    const response = await fetch(url);
    
    if (!response.ok) throw new Error("API Hatası");

    // Görsel yüklendiğinde göster
    img.src = url;
    img.onload = () => {
      loader.style.display = "none";
      img.style.display = "block";
      btn.disabled = false;
      btn.innerText = "GÖRSEL OLUŞTUR";
    };
  } catch (err) {
    alert("Bir hata oluştu. Lütfen Turbo modelini dene.");
    loader.style.display = "none";
    ph.style.display = "block";
    btn.disabled = false;
    btn.innerText = "GÖRSEL OLUŞTUR";
  }
}
</script>

</body>
</html>
