<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Icon Generator</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.container{
  text-align:center;
  background:#1b1b1b;
  padding:30px;
  border-radius:12px;
  width:320px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}
input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-bottom:10px;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#4f7cff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  opacity:0.9;
}
img{
  margin-top:15px;
  width:256px;
  height:256px;
  border-radius:10px;
  background:#222;
}
.download{
  margin-top:10px;
  background:#2ecc71;
}
</style>
</head>
<body>

<div class="container">
  <h2>AI Icon Generator</h2>
  <input id="prompt" placeholder="Describe your icon (rocket, camera...)">
  <button onclick="generate()">Generate Icon</button>
  <img id="result">
  <button class="download" onclick="download()">Download</button>
</div>

<script>
function generate(){
  const prompt = document.getElementById("prompt").value;

  const style = "minimal vector app icon, centered, soft gradient, modern ui icon, dribbble style";

  const finalPrompt = encodeURIComponent(style + ", " + prompt);

  const url = "https://image.pollinations.ai/prompt/" + finalPrompt + "?width=512&height=512&seed=" + Math.floor(Math.random()*100000);

  document.getElementById("result").src = url;
}

function download(){
  const img = document.getElementById("result").src;
  if(!img) return;

  const a = document.createElement("a");
  a.href = img;
  a.download = "icon.png";
  a.click();
}
</script>

</body>
</html>
