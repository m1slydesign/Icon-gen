<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtForge AI - Final Fix</title>
<style>
  body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
  .box { width: 100%; max-width: 400px; text-align: center; }
  .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; }
  textarea { width: 100%; height: 80px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; margin: 10px 0; outline: none; }
  button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #fff; color: #000; font-weight: bold; cursor: pointer; }
  button:disabled { background: #444; cursor: not-allowed; }
  .output { margin-top: 20px; min-height: 300px; background: #050505; border: 1px solid #222; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #resImg { width: 100%; display: none; }
  .loading { display: none; color: #888; }
</style>
</head>
<body>

<div class="box">
  <h2>ArtForge AI</h2>
  <div class="card">
    <textarea id="pInput" placeholder="İngilizce yazarsan daha iyi olur: örn: dragon fire..."></textarea>
    <button id="btn" onclick="draw()">GÖRSEL ÜRET</button>
  </div>

  <div class="output">
    <div id="loader" class="loading">⌛ Yapay zeka çiziyor...</div>
    <div id="error" style="display:none; color:red; padding:20px;">⚠️ API şu an cevap vermiyor, lütfen 10 saniye sonra tekrar dene.</div>
    <img id="resImg" src="" alt="AI Output">
  </div>
</div>

<script>
function draw() {
  const prompt = document.getElementById('pInput').value.trim();
  const btn = document.getElementById('btn');
  const img = document.getElementById('resImg');
  const loader = document.getElementById('loader');
  const error = document.getElementById('error');

  if(!prompt) return alert("Prompt boş!");

  // UI Sıfırla
  btn.disabled = true;
  btn.innerText = "BEKLE...";
  img.style.display = "none";
  error.style.display = "none";
  loader.style.display = "block";

  const seed = Math.floor(Math.random() * 100000);
  // URL'yi daha basit ve güvenli bir hale getirdik
  const cleanPrompt = encodeURIComponent(prompt.toLowerCase());
  const url = `https://image.pollinations.ai/prompt/${cleanPrompt}?seed=${seed}&width=512&height=512&nologo=true&model=turbo`;

  // GÖRSEL KONTROLÜ
  const testImg = new Image();
  
  // Eğer görsel başarıyla gelirse
  testImg.onload = function() {
    loader.style.display = "none";
    img.src = url;
    img.style.display = "block";
    btn.disabled = false;
    btn.innerText = "GÖRSEL ÜRET";
  };

  // Eğer sunucu hata (yazı) döndürürse
  testImg.onerror = function() {
    loader.style.display = "none";
    error.style.display = "block";
    btn.disabled = false;
    btn.innerText = "TEKRAR DENE";
  };

  testImg.src = url;
}
</script>

</body>
</html>
