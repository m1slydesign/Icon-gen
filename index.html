<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IconForge AI - Test</title>
<style>
body{font-family:sans-serif;background:#09090d;color:#eef;display:flex;flex-direction:column;align-items:center;padding:20px;}
input,textarea,select,button{margin:5px;padding:8px;border-radius:6px;border:none;font-size:1rem;}
textarea{width:300px;height:60px;background:#17171f;color:#eef;}
button{background:#7c3aed;color:white;cursor:pointer;}
#result{margin-top:20px;}
img{border:1px solid #444;border-radius:8px;}
</style>
</head>
<body>

<h2>IconForge AI Test</h2>

<textarea id="prompt" placeholder="Örn: magic sword, health potion..."></textarea><br>
<select id="size">
<option value="128">128x128</option>
<option value="256">256x256</option>
<option value="512">512x512</option>
</select>
<button onclick="generate()">Oluştur</button>

<div id="loader" style="display:none;">Üretiliyor...</div>
<div id="result"></div>

<script>
async function generate(){
  const prompt = document.getElementById('prompt').value;
  const size = document.getElementById('size').value;
  const loader = document.getElementById('loader');
  const result = document.getElementById('result');
  result.innerHTML='';
  loader.style.display='block';

  // ⚠️ Buraya kendi OpenAI API anahtarını gir
  const API_KEY = "SK_TEST_KEY"; 

  try{
    const res = await fetch("https://api.openai.com/v1/images/generations", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${API_KEY}`
      },
      body:JSON.stringify({
        model:"gpt-image-1",
        prompt:prompt,
        size:size+"x"+size,
        background:"transparent"
      })
    });
    const data = await res.json();
    loader.style.display='none';
    if(data.data && data.data[0] && data.data[0].url){
      const img = document.createElement('img');
      img.src = data.data[0].url;
      img.width = size;
      img.height = size;
      result.appendChild(img);

      // Download link
      const a = document.createElement('a');
      a.href = data.data[0].url;
      a.download = "icon.png";
      a.textContent = "📥 İndir";
      a.style.display="block";
      a.style.marginTop="10px";
      result.appendChild(a);
    }
  }catch(err){
    loader.style.display='none';
    result.textContent = "Hata: "+err.message;
  }
}
</script>

</body>
</html>
