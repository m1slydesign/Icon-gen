<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ücretsiz Icon Generator</title>
<style>
body{font-family:sans-serif;background:#111;color:#eee;text-align:center;padding:30px;}
input,textarea,button{padding:10px;margin:5px;border-radius:8px;border:none;font-size:1rem;}
textarea{width:300px;height:60px;}
img{margin-top:20px;border:2px solid #444;border-radius:12px;}
button{background:#7c3aed;color:white;cursor:pointer;}
button:hover{opacity:.85;}
</style>
</head>
<body>

<h2>RHOS Pack Icon Generator</h2>
<textarea id="prompt" placeholder="Örn: magic sword, health potion, golden shield..."></textarea><br>
<button onclick="generate()">İkonu Oluştur</button>

<div id="result"></div>

<script>
async function generate(){
    const prompt = document.getElementById('prompt').value;
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = "Üretiliyor...";

    try {
        // Burada Hugging Face ücretsiz Space kullanıyoruz (örnek: runwayml/stable-diffusion-v1-5)
        const response = await fetch("https://api-inference.huggingface.co/models/runwayml/stable-diffusion-v1-5", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({inputs: prompt})
        });

        if(!response.ok) throw new Error("Üretim başarısız");

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        resultDiv.innerHTML = `<img src="${url}" width="256" />`;
    } catch(err) {
        console.error(err);
        resultDiv.innerHTML = "Hata oluştu, tekrar deneyin.";
    }
}
</script>

</body>
</html>
