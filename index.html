<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArtForge AI - V3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root { --bg: #050505; --card: #111; --border: #222; --accent: #fff; --text: #eee; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; }
  .container { width: 100%; max-width: 450px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  h1 { font-family: 'Space Mono', monospace; font-size: 24px; text-align: center; margin-bottom: 20px; letter-spacing: -1px; }
  
  textarea { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 15px; color: #fff; font-size: 14px; resize: none; outline: none; margin-bottom: 15px; transition: border 0.3s; }
  textarea:focus { border-color: #444; }

  .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .result-area { margin-top: 25px; min-height: 300px; background: #000; border: 1px solid var(--border); border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  #outputImg { width: 100%; height: auto; display: none; }
  
  .loader { display: none; text-align: center; font-size: 13px; color: #888; }
  .spin { width: 35px; height: 35px; border: 3px solid #222; border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg { color: #ff4444; font-size: 12px; margin-top: 10px; display: none; text-align: center; }
</style>
</head>
<body>

<div class="container">
  <h1>ArtForge AI</h1>
  
  <div class="card">
    <textarea id="promptInput" rows="4" placeholder="Örn: futuristic samurai, neon lights, 8k..."></textarea>
    <button class="btn" id="genBtn" onclick="createArt()">Görseli Oluştur</button>
    <div id="errorMsg" class="error-msg">Görsel oluşturulamadı, lütfen tekrar dene.</div>
  </div>

  <div class="result-area" id="resBox">
    <div id="placeholder">✨ Sanatın burada belirecek</div>
    <div class="loader" id="loader">
      <div class="spin"></div>
      <p>Yapay zeka hayal ediyor...</p>
    </div>
    <img id="outputImg" alt="AI Generated">
  </div>
</div>

<script>
async function createArt() {
  const prompt = document.getElementById('promptInput').value.trim();
  const btn = document.getElementById('genBtn');
  const img = document.getElementById('outputImg');
  const loader = document.getElementById('loader');
  const ph = document.getElementById('placeholder');
  const error = document.getElementById('errorMsg');

  if (!prompt) {
    alert("Boş bırakma, bir şeyler yaz!");
    return;
  }

  // Arayüzü hazırla
  btn.disabled = true;
  btn.innerText = "HAZIRLANIYOR...";
  error.style.display = "none";
  ph.style.display = "none";
  img.style.display = "none";
  loader.style.display = "block";

  // Farklı bir API rotası deniyoruz (Stable Diffusion tabanlı)
  const seed = Math.floor(Math.random() * 1000000);
  // Bu URL yapısı daha stabildir
  const finalPrompt = encodeURIComponent(prompt + ", high quality, masterpiece, sharp focus");
  const url = `https://image.pollinations.ai/prompt/${finalPrompt}?seed=${seed}&width=1024&height=1024&nologo=true`;

  // Önce görseli yüklemeyi dene
  const checkImg = new Image();
  checkImg.src = url;

  checkImg.onload = function() {
    loader.style.display = "none";
    img.src = url;
    img.style.display = "block";
    btn.disabled = false;
    btn.innerText = "Görseli Oluştur";
  };

  checkImg.onerror = function() {
    loader.style.display = "none";
    error.style.display = "block";
    ph.style.display = "block";
    btn.disabled = false;
    btn.innerText = "Görseli Oluştur";
    alert("Şu an sunucular yoğun. Lütfen 5 saniye sonra tekrar bas.");
  };
}
</script>

</body>
</html>
