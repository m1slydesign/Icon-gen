<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IconForge AI — Pro Icon Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0b10;--s1:#111118;--s2:#181822;--s3:#222233;--bd:#2a2a3d;--t:#eef;--t2:#8888aa;--t3:#555577;--ac:#7c3aed;--ac2:#a855f7;--r:12px}
body{font-family:'Inter','SF Pro Display',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

.nav{position:sticky;top:0;z-index:99;padding:14px 24px;display:flex;align-items:center;gap:10px;background:rgba(11,11,16,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(42,42,61,.3)}
.nav .logo{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#fff,var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav .logo-dot{width:28px;height:28px;background:linear-gradient(135deg,var(--ac),#ec4899);border-radius:8px;display:grid;place-items:center;font-size:.8rem;color:#fff;flex-shrink:0}

.wrap{max-width:900px;margin:0 auto;padding:32px 20px 80px}
h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;text-align:center;margin-bottom:6px;letter-spacing:-.02em}
h1 em{font-style:normal;background:linear-gradient(135deg,var(--ac2),#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:var(--t2);font-size:.95rem;margin-bottom:32px}

/* SECTIONS */
.sec{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:16px}
.sec-t{font-size:.8rem;font-weight:700;color:var(--t2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}

/* CATS */
.cats{display:flex;gap:8px;flex-wrap:wrap}
.cat{background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:7px;font-size:.82rem;font-weight:600;color:var(--t2)}
.cat:hover{border-color:var(--ac);color:var(--t)}
.cat.on{border-color:var(--ac);background:rgba(124,58,237,.1);color:var(--ac2)}
.cat .ci{font-size:1.1rem}

/* PROMPT */
.prompt-wrap{position:relative}
.prompt{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r);padding:14px 16px;color:var(--t);font-size:.95rem;outline:none;transition:.25s;font-family:inherit;resize:none}
.prompt:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(124,58,237,.2)}
.prompt::placeholder{color:var(--t3)}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{background:var(--s3);border:1px solid var(--bd);border-radius:14px;padding:4px 10px;font-size:.72rem;color:var(--t2);cursor:pointer;transition:.15s}
.tag:hover{border-color:var(--ac);color:var(--ac2)}

/* PILLS */
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{background:var(--s2);border:1.5px solid var(--bd);border-radius:9px;padding:8px 14px;font-size:.8rem;font-weight:600;color:var(--t2);cursor:pointer;transition:.2s;text-align:center;min-width:52px}
.pill:hover{border-color:var(--ac)}
.pill.on{border-color:var(--ac);background:rgba(124,58,237,.12);color:var(--ac2)}

/* GEN BTN */
.gen{width:100%;padding:16px;background:linear-gradient(135deg,var(--ac),#9333ea);border:none;border-radius:var(--r);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:.25s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.gen:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,58,237,.35)}
.gen:active{transform:translateY(0)}
.gen:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* LOADING */
.ld{display:none;text-align:center;padding:40px 20px}
.ld.on{display:block}
.spinner{width:40px;height:40px;border:3px solid var(--s3);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-t{color:var(--t2);font-size:.85rem}
.ld-s{color:var(--ac2);font-size:.8rem;font-weight:600;margin-top:4px}
.pbar{width:160px;height:3px;background:var(--s3);border-radius:2px;margin:10px auto 0;overflow:hidden}
.pbar div{height:100%;background:var(--ac);border-radius:2px;width:0;transition:width .3s}

/* OUTPUT */
.output{display:none}
.output.on{display:block}
.var-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--s2);border-radius:10px;padding:4px;border:1px solid var(--bd)}
.vtab{flex:1;padding:9px;text-align:center;font-size:.8rem;font-weight:700;color:var(--t3);cursor:pointer;border-radius:8px;transition:.2s}
.vtab:hover{color:var(--t2)}
.vtab.on{background:var(--s3);color:var(--t)}
.var-panel{display:none}.var-panel.on{display:block}

.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.icard{background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r);padding:12px;text-align:center;transition:.2s;cursor:pointer;position:relative}
.icard:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.icard canvas{width:100%;aspect-ratio:1;border-radius:8px}
.icard .checker{background-image:repeating-conic-gradient(rgba(255,255,255,.04) 0% 25%,transparent 0% 50%);background-size:12px 12px}
.icard .white-check{background-image:repeating-conic-gradient(rgba(0,0,0,.08) 0% 25%,rgba(0,0,0,.03) 0% 50%);background-size:12px 12px;background-color:#f8f8f8;border-radius:8px}
.icard .nm{font-size:.72rem;color:var(--t2);margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icard .dl{position:absolute;top:8px;right:8px;background:var(--ac);color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:.65rem;font-weight:700;cursor:pointer;opacity:0;transition:.2s}
.icard:hover .dl{opacity:1}
.icard .dl:hover{background:var(--ac2)}

.dl-bar{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:12px 16px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r)}
.dl-bar span{font-size:.82rem;color:var(--t2)}
.dl-bar b{color:var(--t)}
.dl-all{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:8px;padding:8px 18px;color:#fff;font-weight:700;cursor:pointer;font-size:.82rem;transition:.2s}
.dl-all:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,185,129,.3)}

.toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid #10b981;border-radius:10px;padding:10px 16px;color:var(--t);font-size:.85rem;z-index:999;transform:translateY(60px);opacity:0;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.on{transform:translateY(0);opacity:1}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .4s ease both}

@media(max-width:600px){.igrid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}.cats{gap:6px}.cat{padding:8px 10px;font-size:.75rem}}
</style>
</head>
<body>

<nav class="nav">
<div class="logo-dot">⚡</div>
<div class="logo">IconForge AI</div>
</nav>

<div class="wrap">
<h1>Prompt Yaz → <em>Pro İkon</em> Al</h1>
<p class="sub">Renkli · Siyah · Beyaz — Üç varyant, tek tıkla</p>

<!-- CATEGORY -->
<div class="sec">
<div class="sec-t">Kategori</div>
<div class="cats" id="cats"></div>
</div>

<!-- PROMPT -->
<div class="sec">
<div class="sec-t">Ne ikon istiyorsun?</div>
<textarea class="prompt" id="prompt" rows="2" placeholder="Örn: magic sword, golden shield, health potion..."></textarea>
<div class="tags" id="tags"></div>
</div>

<!-- SETTINGS -->
<div class="sec">
<div style="display:flex;gap:20px;flex-wrap:wrap">
<div style="flex:1;min-width:140px">
<div class="sec-t">Boyut</div>
<div class="pills" id="sizes">
<div class="pill" data-v="64">64</div>
<div class="pill on" data-v="128">128</div>
<div class="pill" data-v="256">256</div>
<div class="pill" data-v="512">512</div>
</div>
</div>
<div style="flex:1;min-width:140px">
<div class="sec-t">Adet</div>
<div class="pills" id="packs">
<div class="pill on" data-v="1">1</div>
<div class="pill" data-v="4">4'lü</div>
<div class="pill" data-v="6">6'lı</div>
<div class="pill" data-v="9">9'lu</div>
</div>
</div>
</div>
<button class="gen" id="genBtn" onclick="generate()">⚡ İkon Oluştur</button>
</div>

<!-- LOADING -->
<div class="ld" id="loader">
<div class="spinner"></div>
<div class="ld-t">Üretiliyor...</div>
<div class="ld-s" id="ldStep">Analiz</div>
<div class="pbar"><div id="pFill"></div></div>
</div>

<!-- OUTPUT -->
<div class="sec output" id="output">
<div class="var-tabs" id="varTabs">
<div class="vtab on" data-v="color" onclick="showVar('color')">🎨 Renkli</div>
<div class="vtab" data-v="black" onclick="showVar('black')">⬛ Siyah</div>
<div class="vtab" data-v="white" onclick="showVar('white')">⬜ Beyaz</div>
</div>
<div class="var-panel on" id="panelColor"><div class="igrid" id="gridColor"></div></div>
<div class="var-panel" id="panelBlack"><div class="igrid" id="gridBlack"></div></div>
<div class="var-panel" id="panelWhite"><div class="igrid" id="gridWhite"></div></div>
<div class="dl-bar">
<span><b id="cnt">0</b> ikon × 3 varyant = <b id="total">0</b> dosya</span>
<button class="dl-all" onclick="downloadAll()">📦 Tümünü İndir</button>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ CONFIG ============
const CATS=[
{id:'fantasy',n:'Fantasy',i:'🏰',pal:{p:'#FBBF24',p2:'#F59E0B',s:'#92400E',bg1:'#4C1D95',bg2:'#7C3AED',hi:'#FEF3C7'}},
{id:'scifi',n:'Sci-fi',i:'🚀',pal:{p:'#22D3EE',p2:'#06B6D4',s:'#155E75',bg1:'#0C4A6E',bg2:'#0284C7',hi:'#CFFAFE'}},
{id:'game',n:'Game UI',i:'🎮',pal:{p:'#F87171',p2:'#EF4444',s:'#991B1B',bg1:'#7F1D1D',bg2:'#DC2626',hi:'#FEE2E2'}},
{id:'cartoon',n:'Cartoon',i:'🎨',pal:{p:'#34D399',p2:'#10B981',s:'#065F46',bg1:'#064E3B',bg2:'#059669',hi:'#D1FAE5'}},
{id:'minimal',n:'Minimal',i:'◻️',pal:{p:'#A5B4FC',p2:'#818CF8',s:'#3730A3',bg1:'#312E81',bg2:'#4338CA',hi:'#E0E7FF'}},
{id:'neon',n:'Neon',i:'💡',pal:{p:'#E879F9',p2:'#D946EF',s:'#86198F',bg1:'#0A0A0A',bg2:'#1A1A2E',hi:'#FAE8FF'}},
{id:'flat',n:'Flat',i:'🔷',pal:{p:'#60A5FA',p2:'#3B82F6',s:'#1E40AF',bg1:'#1E3A5F',bg2:'#2563EB',hi:'#DBEAFE'}},
{id:'warm',n:'Warm',i:'🔥',pal:{p:'#FB923C',p2:'#F97316',s:'#9A3412',bg1:'#7C2D12',bg2:'#C2410C',hi:'#FED7AA'}}
];

const SUGS={
fantasy:['magic sword','golden shield','crystal gem','enchanted crown','fire staff','dragon eye','mystic potion','spell book'],
scifi:['laser gun','space helmet','cyber eye','plasma core','nano bot','holo screen','warp drive','quantum chip'],
game:['health potion','gold coin','treasure chest','battle axe','magic scroll','iron armor','skill orb','level star'],
cartoon:['happy star','cute heart','funny cloud','magic wand','rainbow','candy','balloon','trophy'],
minimal:['arrow up','home','user','settings','bookmark','search','notification','download'],
neon:['lightning bolt','neon star','electric heart','pulse ring','laser beam','glow orb','cyber lock','signal'],
flat:['chat bubble','camera','music note','compass','rocket','clock','shield','flag'],
warm:['sun','flame','leaf','mountain','sunset','campfire','lantern','candle']
};

// ============ STATE ============
let ST={cat:'game',size:128,pack:1,icons:[]};

// ============ INIT ============
document.addEventListener('DOMContentLoaded',()=>{
const cEl=document.getElementById('cats');
cEl.innerHTML=CATS.map(c=>`<div class="cat ${c.id===ST.cat?'on':''}" data-id="${c.id}"><span class="ci">${c.i}</span>${c.n}</div>`).join('');
cEl.querySelectorAll('.cat').forEach(el=>el.onclick=()=>{
  ST.cat=el.dataset.id;cEl.querySelectorAll('.cat').forEach(x=>x.classList.toggle('on',x.dataset.id===ST.cat));
  updTags();
});
updTags();
pillGroup('sizes','size',parseInt);
pillGroup('packs','pack',parseInt);
document.getElementById('prompt').oninput=e=>ST.prompt=e.target.value;
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();generate()}});
});

function updTags(){
const el=document.getElementById('tags');
el.innerHTML=(SUGS[ST.cat]||[]).map(s=>`<span class="tag">${s}</span>`).join('');
el.querySelectorAll('.tag').forEach(t=>t.onclick=()=>{document.getElementById('prompt').value=t.textContent;ST.prompt=t.textContent});
}
function pillGroup(id,key,parse){
document.querySelectorAll(`#${id} .pill`).forEach(p=>p.onclick=()=>{
  document.querySelectorAll(`#${id} .pill`).forEach(x=>x.classList.remove('on'));
  p.classList.add('on');ST[key]=parse(p.dataset.v);
});}
function showVar(v){
document.querySelectorAll('.vtab').forEach(t=>t.classList.toggle('on',t.dataset.v===v));
document.querySelectorAll('.var-panel').forEach(p=>p.classList.toggle('on',p.id==='panel'+v.charAt(0).toUpperCase()+v.slice(1)));
}

// ============ UTILS ============
function h2r(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function dk(hex,f){const c=h2r(hex);return`rgb(${c.r*f|0},${c.g*f|0},${c.b*f|0})`}
function lt(hex,f){const c=h2r(hex);return`rgb(${Math.min(255,c.r+(255-c.r)*f)|0},${Math.min(255,c.g+(255-c.g)*f)|0},${Math.min(255,c.b+(255-c.b)*f)|0})`}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}
function srng(seed){let s=seed;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}

// ============ SHAPE DETECTION ============
function detect(prompt){
const p=prompt.toLowerCase();
const m={
sword:['sword','kılıç','blade','dagger'],shield:['shield','kalkan','protect','defense','badge'],
star:['star','yıldız','sparkle','favorite'],heart:['heart','kalp','love','life'],
crown:['crown','taç','king','queen','royal'],gem:['gem','diamond','crystal','jewel','elmas','mücevher'],
lightning:['lightning','bolt','yıldırım','electric','thunder','şimşek'],
fire:['fire','flame','ateş','alev','burn','candle','lantern'],
moon:['moon','ay','crescent','night','gece'],sun:['sun','güneş','solar','sunrise','sunset'],
leaf:['leaf','yaprak','plant','nature','tree','forest'],
gear:['gear','settings','ayar','cog'],
rocket:['rocket','roket','launch','space','uzay'],
eye:['eye','göz','vision','watch','see'],
potion:['potion','iksir','bottle','elixir','health','mana'],
skull:['skull','kafatası','skeleton','death','bone'],
key:['key','anahtar'],lock:['lock','kilit','secure','padlock'],
coin:['coin','gold','para','altın','money','token'],
chest:['chest','sandık','treasure','loot','crate'],
arrow:['arrow','ok','up','direction','pointer'],
home:['home','ev','house'],
user:['user','person','avatar','profile','kullanıcı'],
chat:['chat','message','mesaj','bubble','comment','sohbet'],
bell:['bell','zil','notification','alarm','alert'],
music:['music','müzik','note','song','audio','sound'],
compass:['compass','pusula','navigate','direction'],
book:['book','kitap','read','library','spell'],
wand:['wand','asa','magic','sihir','staff','büyü'],
orb:['orb','küre','sphere','ball','globe','skill'],
scroll:['scroll','paper','document','parşömen','list'],
trophy:['trophy','cup','win','reward','achievement','kupa']
};
for(const[k,v]of Object.entries(m))if(v.some(w=>p.includes(w)))return k;
return'star';
}

// ============ RENDER ENGINE (3× SUPERSAMPLE) ============
function createIcon(shape,targetSize,variant,pal){
const SC=3;
const S=targetSize*SC;
const c=document.createElement('canvas');c.width=S;c.height=S;
const x=c.getContext('2d');
x.imageSmoothingEnabled=true;x.imageSmoothingQuality='high';

const cx=S/2,cy=S/2,pad=S*.14,r=(S-pad*2)/2*.78;
const lw=Math.max(1,S*.008);

if(variant==='color'){
  // === BG ===
  x.save();
  x.shadowColor='rgba(0,0,0,.5)';x.shadowBlur=S*.04;x.shadowOffsetY=S*.015;
  x.beginPath();x.roundRect(pad,pad,S-pad*2,S-pad*2,S*.22);
  const bg=x.createLinearGradient(pad,pad,S-pad,S-pad);
  bg.addColorStop(0,pal.bg1);bg.addColorStop(1,pal.bg2);
  x.fillStyle=bg;x.fill();
  x.restore();

  // BG highlight
  x.save();x.globalCompositeOperation='soft-light';
  x.beginPath();x.roundRect(pad,pad,S-pad*2,S-pad*2,S*.22);x.clip();
  const hl=x.createLinearGradient(0,pad,0,S*.5);
  hl.addColorStop(0,'rgba(255,255,255,.25)');hl.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=hl;x.fillRect(pad,pad,S-pad*2,(S-pad*2)*.5);
  x.restore();

  // BG border
  x.beginPath();x.roundRect(pad,pad,S-pad*2,S-pad*2,S*.22);
  x.strokeStyle='rgba(255,255,255,.07)';x.lineWidth=S*.003;x.stroke();

  // === SHAPE SHADOW ===
  x.save();
  x.shadowColor='rgba(0,0,0,.4)';x.shadowBlur=S*.04;x.shadowOffsetY=S*.02;
  drawShape(x,shape,cx,cy,r,S);
  x.fillStyle='rgba(0,0,0,.01)';x.fill();
  x.restore();

  // === MAIN SHAPE ===
  drawShape(x,shape,cx,cy,r,S);
  const sg=x.createLinearGradient(cx-r,cy-r,cx+r*.5,cy+r);
  sg.addColorStop(0,lt(pal.p,.15));sg.addColorStop(.5,pal.p);sg.addColorStop(1,pal.p2);
  x.fillStyle=sg;x.fill();
  x.strokeStyle=dk(pal.s,.8);x.lineWidth=lw;x.lineJoin='round';x.lineCap='round';x.stroke();

  // === BEVEL TOP (inner light) ===
  x.save();
  drawShape(x,shape,cx,cy,r,S);x.clip();
  x.globalCompositeOperation='soft-light';
  const bev=x.createLinearGradient(cx-r,cy-r,cx,cy+r*.3);
  bev.addColorStop(0,'rgba(255,255,255,.4)');bev.addColorStop(.4,'rgba(255,255,255,.05)');bev.addColorStop(1,'rgba(0,0,0,.15)');
  x.fillStyle=bev;x.fillRect(cx-r*1.2,cy-r*1.2,r*2.4,r*2.4);
  x.restore();

  // === INNER SHADOW ===
  x.save();
  drawShape(x,shape,cx,cy,r,S);x.clip();
  x.shadowColor='rgba(0,0,0,.35)';x.shadowBlur=S*.03;x.shadowOffsetX=0;x.shadowOffsetY=S*.015;
  x.beginPath();x.rect(cx-r*2,cy-r*2-S*.1,r*4,S*.1+r*.1);
  x.fillStyle='rgba(0,0,0,0)';x.fill();
  x.restore();

  // === SPECULAR ===
  x.save();x.globalAlpha=.55;
  x.beginPath();x.arc(cx-r*.28,cy-r*.3,r*.09,0,Math.PI*2);
  x.fillStyle='#fff';x.fill();
  x.globalAlpha=.25;
  x.beginPath();x.arc(cx-r*.15,cy-r*.22,r*.04,0,Math.PI*2);
  x.fillStyle='#fff';x.fill();
  x.restore();

  // === SHAPE DETAIL ===
  drawDetail(x,shape,cx,cy,r,S,pal);

}else{
  // MONO (Black or White)
  const col=variant==='black'?'#000000':'#FFFFFF';
  drawShape(x,shape,cx,cy,r,S);
  x.fillStyle=col;x.fill();
}

// Downsample
const out=document.createElement('canvas');out.width=targetSize;out.height=targetSize;
const ox=out.getContext('2d');
ox.imageSmoothingEnabled=true;ox.imageSmoothingQuality='high';
ox.drawImage(c,0,0,targetSize,targetSize);
return out;
}

// ============ SHAPE PATHS ============
function drawShape(x,shape,cx,cy,r,S){
x.beginPath();
const P=paths[shape]||paths.star;
P(x,cx,cy,r,S);
}

const paths={

star(x,cx,cy,r){
  for(let i=0;i<10;i++){const a=Math.PI*2*i/10-Math.PI/2;const rd=i%2?r*.42:r;x[i?'lineTo':'moveTo'](cx+Math.cos(a)*rd,cy+Math.sin(a)*rd)}
  x.closePath();
},

heart(x,cx,cy,r){
  const s=r*.7;
  x.moveTo(cx,cy+s);
  x.bezierCurveTo(cx+s*2.2,cy-s*.3,cx+s*.7,cy-s*1.8,cx,cy-s*.6);
  x.bezierCurveTo(cx-s*.7,cy-s*1.8,cx-s*2.2,cy-s*.3,cx,cy+s);
},

shield(x,cx,cy,r){
  x.moveTo(cx,cy-r);
  x.lineTo(cx+r*.82,cy-r*.5);
  x.lineTo(cx+r*.82,cy+r*.15);
  x.quadraticCurveTo(cx+r*.55,cy+r*.82,cx,cy+r);
  x.quadraticCurveTo(cx-r*.55,cy+r*.82,cx-r*.82,cy+r*.15);
  x.lineTo(cx-r*.82,cy-r*.5);
  x.closePath();
},

sword(x,cx,cy,r){
  const w=r*.1;
  x.moveTo(cx,cy-r*1.05);
  x.lineTo(cx+w*1.3,cy+r*.15);x.lineTo(cx+r*.38,cy+r*.22);
  x.lineTo(cx+r*.38,cy+r*.32);x.lineTo(cx+w*1.8,cy+r*.32);
  x.lineTo(cx+w*1.8,cy+r*.95);x.lineTo(cx+w*2.5,cy+r*.95);
  x.lineTo(cx+w*2.5,cy+r*1.05);x.lineTo(cx-w*2.5,cy+r*1.05);
  x.lineTo(cx-w*2.5,cy+r*.95);x.lineTo(cx-w*1.8,cy+r*.95);
  x.lineTo(cx-w*1.8,cy+r*.32);x.lineTo(cx-r*.38,cy+r*.32);
  x.lineTo(cx-r*.38,cy+r*.22);x.lineTo(cx-w*1.3,cy+r*.15);
  x.closePath();
},

crown(x,cx,cy,r){
  const w=r*.85,h=r*.75;
  x.moveTo(cx-w,cy+h*.5);
  x.lineTo(cx-w,cy-h*.15);x.lineTo(cx-w*.45,cy+h*.2);
  x.lineTo(cx,cy-h*.7);x.lineTo(cx+w*.45,cy+h*.2);
  x.lineTo(cx+w,cy-h*.15);x.lineTo(cx+w,cy+h*.5);
  x.closePath();
},

gem(x,cx,cy,r){
  x.moveTo(cx,cy-r);
  x.lineTo(cx+r*.68,cy-r*.22);x.lineTo(cx+r*.48,cy+r);
  x.lineTo(cx-r*.48,cy+r);x.lineTo(cx-r*.68,cy-r*.22);
  x.closePath();
},

lightning(x,cx,cy,r){
  const w=r*.42;
  x.moveTo(cx+w*.4,cy-r*1.05);x.lineTo(cx+w,cy-r*1.05);
  x.lineTo(cx-w*.1,cy+r*.12);x.lineTo(cx+w*.55,cy+r*.12);
  x.lineTo(cx-w*.3,cy+r*1.05);x.lineTo(cx-w*.15,cy+r*.02);
  x.lineTo(cx-w*.7,cy+r*.02);
  x.closePath();
},

fire(x,cx,cy,r){
  x.moveTo(cx,cy-r);
  x.bezierCurveTo(cx+r*.3,cy-r*.55,cx+r*.8,cy-r*.1,cx+r*.52,cy+r*.5);
  x.bezierCurveTo(cx+r*.4,cy+r*.78,cx+r*.18,cy+r*.92,cx,cy+r*.82);
  x.bezierCurveTo(cx-r*.18,cy+r*.92,cx-r*.4,cy+r*.78,cx-r*.52,cy+r*.5);
  x.bezierCurveTo(cx-r*.8,cy-r*.1,cx-r*.3,cy-r*.55,cx,cy-r);
},

moon(x,cx,cy,r){
  x.arc(cx,cy,r*.82,0,Math.PI*2);
  x.moveTo(cx+r*.35+r*.62,cy);
  x.arc(cx+r*.35,cy,r*.62,0,Math.PI*2,true);
},

sun(x,cx,cy,r){
  // rays + circle
  for(let i=0;i<12;i++){
    const a=Math.PI*2*i/12-Math.PI/2;
    const a1=a-.08,a2=a+.08;
    const ri=r*.55,ro=r*.92;
    x.moveTo(cx+Math.cos(a1)*ri,cy+Math.sin(a1)*ri);
    x.lineTo(cx+Math.cos(a)*ro,cy+Math.sin(a)*ro);
    x.lineTo(cx+Math.cos(a2)*ri,cy+Math.sin(a2)*ri);
  }
  x.moveTo(cx+r*.48,cy);x.arc(cx,cy,r*.48,0,Math.PI*2);
},

leaf(x,cx,cy,r){
  x.moveTo(cx,cy-r*.85);
  x.bezierCurveTo(cx+r*.85,cy-r*.35,cx+r*.7,cy+r*.5,cx,cy+r*.85);
  x.bezierCurveTo(cx-r*.7,cy+r*.5,cx-r*.85,cy-r*.35,cx,cy-r*.85);
},

gear(x,cx,cy,r){
  const t=8,outer=r*.92,mid=r*.68,inner=r*.3;
  for(let i=0;i<t;i++){
    const a=Math.PI*2*i/t-Math.PI/2;
    const aw=Math.PI/t*.35;
    const a1=a-aw,a2=a+aw,a3=a+Math.PI/t-aw,a4=a+Math.PI/t+aw;
    x[i?'lineTo':'moveTo'](cx+Math.cos(a1)*mid,cy+Math.sin(a1)*mid);
    x.lineTo(cx+Math.cos(a1)*outer,cy+Math.sin(a1)*outer);
    x.lineTo(cx+Math.cos(a2)*outer,cy+Math.sin(a2)*outer);
    x.lineTo(cx+Math.cos(a2)*mid,cy+Math.sin(a2)*mid);
    x.lineTo(cx+Math.cos(a3)*mid,cy+Math.sin(a3)*mid);
  }
  x.closePath();
  x.moveTo(cx+inner,cy);x.arc(cx,cy,inner,0,Math.PI*2,true);
},

rocket(x,cx,cy,r){
  x.moveTo(cx,cy-r*1.05);
  x.bezierCurveTo(cx+r*.35,cy-r*.52,cx+r*.32,cy+r*.35,cx+r*.25,cy+r*.62);
  x.lineTo(cx+r*.58,cy+r*.92);x.lineTo(cx+r*.18,cy+r*.62);
  x.lineTo(cx,cy+r*.78);x.lineTo(cx-r*.18,cy+r*.62);
  x.lineTo(cx-r*.58,cy+r*.92);x.lineTo(cx-r*.25,cy+r*.62);
  x.bezierCurveTo(cx-r*.32,cy+r*.35,cx-r*.35,cy-r*.52,cx,cy-r*1.05);
},

eye(x,cx,cy,r){
  x.moveTo(cx-r*.95,cy);
  x.bezierCurveTo(cx-r*.45,cy-r*.8,cx+r*.45,cy-r*.8,cx+r*.95,cy);
  x.bezierCurveTo(cx+r*.45,cy+r*.8,cx-r*.45,cy+r*.8,cx-r*.95,cy);
  x.closePath();
  x.moveTo(cx+r*.32,cy);x.arc(cx,cy,r*.32,0,Math.PI*2);
},

potion(x,cx,cy,r){
  x.moveTo(cx-r*.16,cy-r*.82);x.lineTo(cx+r*.16,cy-r*.82);
  x.lineTo(cx+r*.16,cy-r*.42);x.lineTo(cx+r*.52,cy-r*.05);
  x.bezierCurveTo(cx+r*.65,cy+r*.22,cx+r*.55,cy+r*.78,cx,cy+r*.92);
  x.bezierCurveTo(cx-r*.55,cy+r*.78,cx-r*.65,cy+r*.22,cx-r*.52,cy-r*.05);
  x.lineTo(cx-r*.16,cy-r*.42);x.closePath();
},

skull(x,cx,cy,r){
  x.arc(cx,cy-r*.12,r*.68,Math.PI*.15,Math.PI*.85,true);
  x.bezierCurveTo(cx-r*.42,cy+r*.48,cx-r*.28,cy+r*.85,cx-r*.18,cy+r*.85);
  x.lineTo(cx-r*.08,cy+r*.62);x.lineTo(cx,cy+r*.85);
  x.lineTo(cx+r*.08,cy+r*.62);x.lineTo(cx+r*.18,cy+r*.85);
  x.bezierCurveTo(cx+r*.28,cy+r*.85,cx+r*.42,cy+r*.48,cx+r*.65,cy+r*.08);
  x.closePath();
},

key(x,cx,cy,r){
  x.arc(cx,cy-r*.42,r*.38,0,Math.PI*2);
  x.moveTo(cx+r*.38,cy-r*.42);
  x.arc(cx,cy-r*.42,r*.18,0,Math.PI*2,true);
  x.moveTo(cx-r*.08,cy-r*.06);
  x.rect(cx-r*.08,cy-r*.06,r*.16,r*1.08);
  x.rect(cx+r*.08,cy+r*.52,r*.22,r*.09);
  x.rect(cx+r*.08,cy+r*.72,r*.16,r*.09);
},

lock(x,cx,cy,r){
  x.roundRect(cx-r*.62,cy-r*.12,r*1.24,r*1.08,r*.12);
  x.moveTo(cx+r*.42,cy-r*.12);
  x.arc(cx,cy-r*.12,r*.42,0,Math.PI,true);
  x.lineTo(cx-r*.42,cy-r*.12);x.lineTo(cx-r*.26,cy-r*.12);
  x.arc(cx,cy-r*.12,r*.26,Math.PI,0);
  x.closePath();
},

coin(x,cx,cy,r){
  x.arc(cx,cy,r*.82,0,Math.PI*2);
  x.moveTo(cx+r*.62,cy);x.arc(cx,cy,r*.62,0,Math.PI*2,true);
},

chest(x,cx,cy,r){
  const w=r*.85,h=r*.55;
  x.roundRect(cx-w,cy-h*.2,w*2,h*1.3,r*.08);
  x.moveTo(cx-w,cy-h*.2);
  x.bezierCurveTo(cx-w,cy-h*.95,cx+w,cy-h*.95,cx+w,cy-h*.2);
  x.lineTo(cx-w,cy-h*.2);
},

arrow(x,cx,cy,r){
  const w=r*.22;
  x.moveTo(cx,cy-r*.95);x.lineTo(cx+r*.55,cy-r*.1);
  x.lineTo(cx+w,cy-r*.1);x.lineTo(cx+w,cy+r*.95);
  x.lineTo(cx-w,cy+r*.95);x.lineTo(cx-w,cy-r*.1);
  x.lineTo(cx-r*.55,cy-r*.1);x.closePath();
},

home(x,cx,cy,r){
  // roof
  x.moveTo(cx,cy-r*.88);x.lineTo(cx+r*.82,cy-r*.02);
  x.lineTo(cx+r*.62,cy-r*.02);x.lineTo(cx+r*.62,cy+r*.82);
  x.lineTo(cx+r*.15,cy+r*.82);x.lineTo(cx+r*.15,cy+r*.22);
  x.lineTo(cx-r*.15,cy+r*.22);x.lineTo(cx-r*.15,cy+r*.82);
  x.lineTo(cx-r*.62,cy+r*.82);x.lineTo(cx-r*.62,cy-r*.02);
  x.lineTo(cx-r*.82,cy-r*.02);x.closePath();
},

user(x,cx,cy,r){
  x.arc(cx,cy-r*.35,r*.32,0,Math.PI*2);x.closePath();
  x.moveTo(cx+r*.72,cy+r*.88);
  x.bezierCurveTo(cx+r*.72,cy+r*.18,cx+r*.48,cy+r*.05,cx,cy+r*.12);
  x.bezierCurveTo(cx-r*.48,cy+r*.05,cx-r*.72,cy+r*.18,cx-r*.72,cy+r*.88);
  x.closePath();
},

chat(x,cx,cy,r){
  x.roundRect(cx-r*.78,cy-r*.58,r*1.56,r*1.05,r*.18);
  x.moveTo(cx-r*.25,cy+r*.47);x.lineTo(cx-r*.5,cy+r*.88);
  x.lineTo(cx+r*.05,cy+r*.47);
},

bell(x,cx,cy,r){
  x.moveTo(cx-r*.55,cy+r*.48);
  x.bezierCurveTo(cx-r*.55,cy-r*.3,cx-r*.28,cy-r*.85,cx,cy-r*.85);
  x.bezierCurveTo(cx+r*.28,cy-r*.85,cx+r*.55,cy-r*.3,cx+r*.55,cy+r*.48);
  x.lineTo(cx+r*.72,cy+r*.58);x.lineTo(cx-r*.72,cy+r*.58);x.closePath();
  x.moveTo(cx+r*.14,cy+r*.72);x.arc(cx,cy+r*.72,r*.14,0,Math.PI*2);
},

music(x,cx,cy,r){
  x.arc(cx-r*.22,cy+r*.48,r*.22,0,Math.PI*2);x.closePath();
  x.arc(cx+r*.32,cy+r*.28,r*.22,0,Math.PI*2);x.closePath();
  x.rect(cx-r*.04,cy-r*.72,r*.08,r*1.2);
  x.rect(cx+r*.5,cy-r*.82,r*.08,r*1.1);
  x.rect(cx-r*.04,cy-r*.72,r*.58,r*.08);
},

compass(x,cx,cy,r){
  x.arc(cx,cy,r*.85,0,Math.PI*2);x.closePath();
  x.moveTo(cx+r*.62,cy);x.arc(cx,cy,r*.62,0,Math.PI*2,true);
  x.moveTo(cx,cy-r*.52);x.lineTo(cx+r*.12,cy);x.lineTo(cx,cy+r*.52);x.lineTo(cx-r*.12,cy);x.closePath();
},

book(x,cx,cy,r){
  x.moveTo(cx,cy-r*.72);x.lineTo(cx-r*.78,cy-r*.72);x.lineTo(cx-r*.78,cy+r*.72);
  x.lineTo(cx,cy+r*.52);x.closePath();
  x.moveTo(cx,cy-r*.72);x.lineTo(cx+r*.78,cy-r*.72);
  x.lineTo(cx+r*.78,cy+r*.72);x.lineTo(cx,cy+r*.52);x.closePath();
},

wand(x,cx,cy,r){
  x.save();x.translate(cx,cy);x.rotate(-Math.PI/4.5);
  x.roundRect(-r*.065,-r*1.05,r*.13,r*2.1,r*.04);
  x.restore();
  // star at tip
  const tx=cx-r*.38,ty=cy-r*.42;
  for(let i=0;i<8;i++){const a=Math.PI*2*i/8-Math.PI/2;const rd=i%2?r*.08:r*.2;
    x[i?'lineTo':'moveTo'](tx+Math.cos(a)*rd,ty+Math.sin(a)*rd)}
  x.closePath();
},

orb(x,cx,cy,r){
  x.arc(cx,cy,r*.78,0,Math.PI*2);
},

scroll(x,cx,cy,r){
  x.rect(cx-r*.5,cy-r*.65,r*1,r*1.3);
  x.moveTo(cx+r*.58,cy-r*.65);
  x.arc(cx,cy-r*.65,r*.58,0,Math.PI,true);
  x.moveTo(cx+r*.58,cy+r*.65);
  x.arc(cx,cy+r*.65,r*.58,0,Math.PI);
},

trophy(x,cx,cy,r){
  // cup
  x.moveTo(cx-r*.5,cy-r*.65);x.lineTo(cx+r*.5,cy-r*.65);
  x.lineTo(cx+r*.35,cy+r*.2);
  x.quadraticCurveTo(cx+r*.15,cy+r*.45,cx+r*.12,cy+r*.55);
  x.lineTo(cx+r*.35,cy+r*.55);x.lineTo(cx+r*.35,cy+r*.7);
  x.lineTo(cx-r*.35,cy+r*.7);x.lineTo(cx-r*.35,cy+r*.55);
  x.lineTo(cx-r*.12,cy+r*.55);
  x.quadraticCurveTo(cx-r*.15,cy+r*.45,cx-r*.35,cy+r*.2);
  x.closePath();
  // handles
  x.moveTo(cx+r*.5,cy-r*.45);
  x.quadraticCurveTo(cx+r*.82,cy-r*.35,cx+r*.75,cy-r*.05);
  x.quadraticCurveTo(cx+r*.7,cy+r*.15,cx+r*.42,cy+r*.1);
  x.moveTo(cx-r*.5,cy-r*.45);
  x.quadraticCurveTo(cx-r*.82,cy-r*.35,cx-r*.75,cy-r*.05);
  x.quadraticCurveTo(cx-r*.7,cy+r*.15,cx-r*.42,cy+r*.1);
}
};

// ============ DETAIL OVERLAYS (colored only) ============
function drawDetail(x,shape,cx,cy,r,S,pal){
const lw=Math.max(1,S*.005);
x.lineWidth=lw;x.lineCap='round';x.lineJoin='round';

const details={
  gem(){
    // facet lines
    x.beginPath();
    x.moveTo(cx,cy-r);x.lineTo(cx-r*.12,cy-r*.22);x.moveTo(cx,cy-r);x.lineTo(cx+r*.12,cy-r*.22);
    x.moveTo(cx-r*.68,cy-r*.22);x.lineTo(cx-r*.12,cy-r*.22);x.lineTo(cx-r*.48,cy+r);
    x.moveTo(cx+r*.68,cy-r*.22);x.lineTo(cx+r*.12,cy-r*.22);x.lineTo(cx+r*.48,cy+r);
    x.moveTo(cx-r*.12,cy-r*.22);x.lineTo(cx+r*.12,cy-r*.22);
    x.strokeStyle='rgba(255,255,255,.12)';x.stroke();
    // bright facet
    x.beginPath();x.moveTo(cx,cy-r);x.lineTo(cx-r*.12,cy-r*.22);x.lineTo(cx+r*.12,cy-r*.22);x.closePath();
    x.fillStyle='rgba(255,255,255,.1)';x.fill();
  },
  shield(){
    // inner border
    x.save();x.translate(cx,cy);x.scale(.72,.72);x.translate(-cx,-cy);
    paths.shield(x,cx,cy,r,S);x.strokeStyle='rgba(255,255,255,.1)';x.lineWidth=lw;x.stroke();x.restore();
    // center emblem
    x.beginPath();
    for(let i=0;i<8;i++){const a=Math.PI*2*i/8-Math.PI/2;const rd=i%2?r*.1:r*.22;
      x[i?'lineTo':'moveTo'](cx+Math.cos(a)*rd,cy+Math.sin(a)*rd-r*.05)}
    x.closePath();x.fillStyle='rgba(255,255,255,.12)';x.fill();
  },
  sword(){
    // blade line
    x.beginPath();x.moveTo(cx,cy-r*.85);x.lineTo(cx,cy+r*.1);
    x.strokeStyle='rgba(255,255,255,.12)';x.stroke();
    // guard gems
    x.beginPath();x.arc(cx-r*.28,cy+r*.27,S*.012,0,Math.PI*2);x.arc(cx+r*.28,cy+r*.27,S*.012,0,Math.PI*2);
    x.fillStyle=pal.hi;x.globalAlpha=.5;x.fill();x.globalAlpha=1;
  },
  crown(){
    // band
    x.beginPath();x.rect(cx-r*.85,cy+r*.3,r*1.7,r*.15);
    x.fillStyle='rgba(0,0,0,.15)';x.fill();
    // gems on points
    [[0,-r*.7],[r*.45*.85,r*.15],[-r*.45*.85,r*.15]].forEach(([dx,dy])=>{
      x.beginPath();x.arc(cx+dx,cy+dy,S*.015,0,Math.PI*2);x.fillStyle=pal.hi;x.globalAlpha=.6;x.fill();x.globalAlpha=1;
    });
  },
  potion(){
    // cork
    x.beginPath();x.roundRect(cx-r*.2,cy-r*.92,r*.4,r*.15,S*.008);
    x.fillStyle=dk(pal.s,.6);x.fill();
    // liquid line
    x.beginPath();x.moveTo(cx-r*.4,cy+r*.15);x.quadraticCurveTo(cx,cy+r*.05,cx+r*.4,cy+r*.15);
    x.strokeStyle='rgba(255,255,255,.12)';x.stroke();
    // bubbles
    [[-.1,.35,.022],[.12,.52,.015],[.18,.3,.012]].forEach(([dx,dy,s])=>{
      x.beginPath();x.arc(cx+r*dx,cy+r*dy,S*s,0,Math.PI*2);x.fillStyle='rgba(255,255,255,.2)';x.fill();
    });
  },
  eye(){
    // pupil fill
    x.beginPath();x.arc(cx,cy,r*.15,0,Math.PI*2);x.fillStyle='#111';x.fill();
    // iris rays
    x.save();x.globalAlpha=.1;
    for(let i=0;i<10;i++){const a=Math.PI*2*i/10;
      x.beginPath();x.moveTo(cx+Math.cos(a)*r*.16,cy+Math.sin(a)*r*.16);
      x.lineTo(cx+Math.cos(a)*r*.3,cy+Math.sin(a)*r*.3);x.strokeStyle=pal.p;x.lineWidth=lw;x.stroke();}
    x.restore();
    // shine
    x.beginPath();x.arc(cx-r*.1,cy-r*.1,r*.07,0,Math.PI*2);x.fillStyle='rgba(255,255,255,.5)';x.fill();
  },
  rocket(){
    // window
    x.beginPath();x.arc(cx,cy-r*.2,r*.15,0,Math.PI*2);
    x.fillStyle='rgba(100,180,255,.3)';x.fill();x.strokeStyle='rgba(255,255,255,.1)';x.stroke();
    x.beginPath();x.arc(cx-r*.04,cy-r*.24,r*.04,0,Math.PI*2);x.fillStyle='rgba(255,255,255,.3)';x.fill();
  },
  coin(){
    // $ symbol
    x.font=`bold ${S*.12}px sans-serif`;x.textAlign='center';x.textBaseline='middle';
    x.fillStyle='rgba(255,255,255,.18)';x.fillText('$',cx,cy+S*.005);
  },
  chest(){
    // lock
    x.beginPath();x.roundRect(cx-r*.1,cy-r*.4,r*.2,r*.16,S*.008);
    x.fillStyle=pal.hi;x.globalAlpha=.5;x.fill();x.globalAlpha=1;
    // bands
    x.strokeStyle='rgba(0,0,0,.12)';x.lineWidth=S*.005;
    [-.5,.5].forEach(dx=>{x.beginPath();x.moveTo(cx+r*dx,cy-r*.78);x.lineTo(cx+r*dx,cy+r*.75);x.stroke()});
  },
  compass(){
    // N red
    x.beginPath();x.moveTo(cx,cy-r*.52);x.lineTo(cx+r*.06,cy);x.lineTo(cx-r*.06,cy);x.closePath();
    x.fillStyle='#EF4444';x.globalAlpha=.6;x.fill();x.globalAlpha=1;
  },
  skull(){
    // eyes
    [[-r*.2,-r*.15],[r*.2,-r*.15]].forEach(([dx,dy])=>{
      x.beginPath();x.ellipse(cx+dx,cy+dy,r*.13,r*.16,0,0,Math.PI*2);x.fillStyle=dk(pal.p,.3);x.fill();
    });
    // nose
    x.beginPath();x.moveTo(cx,cy+r*.12);x.lineTo(cx-r*.06,cy+r*.25);x.lineTo(cx+r*.06,cy+r*.25);x.closePath();
    x.fillStyle=dk(pal.p,.3);x.fill();
  },
  gear(){
    // center dot
    x.beginPath();x.arc(cx,cy,r*.15,0,Math.PI*2);x.fillStyle=dk(pal.p,.4);x.fill();
  },
  orb(){
    // inner glow
    x.save();x.globalAlpha=.15;
    const ig=x.createRadialGradient(cx-r*.15,cy-r*.2,0,cx,cy,r*.7);
    ig.addColorStop(0,'#fff');ig.addColorStop(1,'transparent');
    x.beginPath();x.arc(cx,cy,r*.75,0,Math.PI*2);x.fillStyle=ig;x.fill();x.restore();
    // shine ellipse
    x.save();x.globalAlpha=.25;
    x.beginPath();x.ellipse(cx-r*.18,cy-r*.32,r*.18,r*.08,-.4,0,Math.PI*2);
    x.fillStyle='#fff';x.fill();x.restore();
  },
  trophy(){
    // star
    x.beginPath();
    for(let i=0;i<10;i++){const a=Math.PI*2*i/10-Math.PI/2;const rd=i%2?r*.06:r*.14;
      x[i?'lineTo':'moveTo'](cx+Math.cos(a)*rd,cy+Math.sin(a)*rd-r*.25)}
    x.closePath();x.fillStyle='rgba(255,255,255,.15)';x.fill();
  }
};
if(details[shape])details[shape]();
}

// ============ RELATED SHAPES FOR PACKS ============
function related(shape){
const g={
  combat:['sword','shield','arrow','skull','crown','trophy'],
  magic:['star','gem','wand','potion','orb','eye','scroll'],
  nature:['leaf','sun','moon','fire','cloud'],
  ui:['gear','home','user','chat','bell','music','compass','book','lock','key'],
  loot:['coin','chest','gem','crown','key','trophy','star','ring']
};
for(const[,v]of Object.entries(g))if(v.includes(shape))return v.filter(s=>s!==shape);
return['star','heart','gem','shield','crown'];
}

// ============ GENERATE ============
async function generate(){
const prompt=document.getElementById('prompt').value.trim();
if(!prompt)return toast('Prompt girin!');

const btn=document.getElementById('genBtn');btn.disabled=true;
document.getElementById('output').classList.remove('on');
const ld=document.getElementById('loader');ld.classList.add('on');
const steps=['Analiz','Oluşturuluyor','Render','Son rötuş'];
let si=0;
const pf=document.getElementById('pFill');
const iv=setInterval(()=>{si++;if(si<steps.length){document.getElementById('ldStep').textContent=steps[si];pf.style.width=((si+1)/steps.length*100)+'%'}},400);

await new Promise(r=>setTimeout(r,1800));
clearInterval(iv);pf.style.width='100%';

const cat=CATS.find(c=>c.id===ST.cat);
const shape=detect(prompt);
const rel=related(shape);
ST.icons=[];

for(let i=0;i<ST.pack;i++){
  let sh=i===0?shape:rel[(i-1)%rel.length];
  const color=createIcon(sh,ST.size,'color',cat.pal);
  const black=createIcon(sh,ST.size,'black',cat.pal);
  const white=createIcon(sh,ST.size,'white',cat.pal);
  const label=prompt+(ST.pack>1?` (${i+1}/${ST.pack})`:'');
  ST.icons.push({
    shape:sh,label,size:ST.size,
    color:color.toDataURL('image/png'),
    black:black.toDataURL('image/png'),
    white:white.toDataURL('image/png')
  });
}

await new Promise(r=>setTimeout(r,300));
ld.classList.remove('on');pf.style.width='0';btn.disabled=false;
document.getElementById('output').classList.add('on');
showVar('color');
renderAll();
toast(`${ST.pack} ikon × 3 varyant oluşturuldu!`);
}

function renderAll(){
['color','black','white'].forEach(v=>{
  const grid=document.getElementById('grid'+v.charAt(0).toUpperCase()+v.slice(1));
  const isWhite=v==='white';
  grid.innerHTML=ST.icons.map((ic,i)=>`
    <div class="icon-card icard anim" style="animation-delay:${i*.06}s" onclick="dlSingle(${i},'${v}')">
      <img src="${ic[v]}" class="${isWhite?'white-check':'checker'}" style="width:100%;aspect-ratio:1;border-radius:8px">
      <div class="nm">${ic.label}</div>
      <button class="dl" onclick="event.stopPropagation();dlSingle(${i},'${v}')">⬇ PNG</button>
    </div>
  `).join('');
});
document.getElementById('cnt').textContent=ST.icons.length;
document.getElementById('total').textContent=ST.icons.length*3;
}

function dlSingle(i,variant){
const ic=ST.icons[i];
const a=document.createElement('a');
a.href=ic[variant];
a.download=`iconforge-${ic.shape}-${variant}-${ic.size}px.png`;
a.click();
toast('İndirildi!');
}

function downloadAll(){
let delay=0;
ST.icons.forEach((ic,i)=>{
  ['color','black','white'].forEach(v=>{
    setTimeout(()=>{
      const a=document.createElement('a');a.href=ic[v];
      a.download=`iconforge-${ic.shape}-${v}-${ic.size}px.png`;a.click();
    },delay);
    delay+=150;
  });
});
toast(`${ST.icons.length*3} dosya indiriliyor...`);
}

function toast(m){const t=document.getElementById('toast');t.textContent='✓ '+m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500)}
</script>
